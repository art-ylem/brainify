# HTTP → redirect to HTTPS
server {
    listen 80;
    server_name brainify.ellow.tech;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    http2 on;
    server_name brainify.ellow.tech;

    ssl_certificate /etc/letsencrypt/live/brainify.ellow.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/brainify.ellow.tech/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Request size limit
    client_max_body_size 2m;

    # Security headers
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://telegram.org; frame-ancestors 'self' https://web.telegram.org https://*.telegram.org" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # API proxy
    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check — internal only (Docker network)
    location /health {
        allow 172.16.0.0/12;
        deny all;
        proxy_pass http://api:3000;
    }

    # Webapp static files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets (with security headers duplicated)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://telegram.org; frame-ancestors 'self' https://web.telegram.org https://*.telegram.org" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        }
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 256;
}
