services:
  postgres:
    image: postgres:16-alpine
    container_name: brainify-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-brainify}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-brainify}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-brainify}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: brainify-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: brainify-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-brainify}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-brainify}
      REDIS_URL: redis://redis:6379
      API_HOST: 0.0.0.0
      API_PORT: 3000
      BOT_TOKEN: ${BOT_TOKEN}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      NODE_ENV: production
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: bot
    container_name: brainify-bot
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      WEBAPP_URL: ${WEBAPP_URL}
      API_HOST: api
      API_PORT: 3000
      REDIS_URL: redis://redis:6379
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      PAYMENT_PROVIDER_TOKEN: ${PAYMENT_PROVIDER_TOKEN:-}
      NODE_ENV: production

  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: webapp
    container_name: brainify-nginx
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro

volumes:
  pgdata:
  redisdata:
