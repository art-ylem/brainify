name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit -p packages/shared/tsconfig.json
      - run: npx tsc --noEmit -p packages/api/tsconfig.json
      - run: npx tsc --noEmit -p packages/bot/tsconfig.json
      - run: npx tsc --noEmit -p packages/webapp/tsconfig.json
      - run: npx vitest run
      - run: npm run -w packages/webapp build
