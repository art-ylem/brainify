name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit -p packages/shared/tsconfig.json
      - run: npx tsc --noEmit -p packages/api/tsconfig.json
      - run: npx tsc --noEmit -p packages/bot/tsconfig.json
      - run: npx tsc --noEmit -p packages/webapp/tsconfig.json
      - run: npx vitest run

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "."
          target: /opt/brainify
          overwrite: true

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/brainify
            docker compose -f docker-compose.prod.yml build
            docker compose -f docker-compose.prod.yml up -d
            sleep 5
            docker compose -f docker-compose.prod.yml exec api npx drizzle-kit migrate
            docker compose -f docker-compose.prod.yml exec api wget --quiet --tries=1 --spider http://localhost:3000/health || echo "Health check warning"
